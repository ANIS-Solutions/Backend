services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: anis-api
    restart: unless-stopped
    command: ['pnpm', 'dev']
    env_file: ./config.env
    environment:
      HOST_ON: DOCKER_CONTAINER
      DATABASE: mongodb://mongo:27017
      REDIS_URL: 'redis://redis:6379'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
    ports:
      - '5000:5000'
    volumes:
      - ./:/app/anis-backend
      - ../anis-shared:/app/anis-shared
      - /app/anis-backend/node_modules
    networks:
      - anis-dev
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: anis-worker
    restart: unless-stopped
    command: ['pnpm', 'dev:worker']
    env_file: ./config.env
    environment:
      HOST_ON: DOCKER_CONTAINER
      DATABASE: mongodb://mongo:27017
      REDIS_URL: 'redis://redis:6379'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ''
    volumes:
      - ./:/app/anis-backend
      - /app/anis-backend/node_modules
      - ../anis-shared:/app/anis-shared
    networks:
      - anis-dev
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'

  mongo:
    image: mongo:7
    container_name: anis-mongo-dev
    restart: unless-stopped
    command: ['mongod', '--quiet', '--logpath', '/dev/null']
    ports:
      - '27018:27017'
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - anis-dev
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  redis:
    image: redis:7-alpine
    container_name: anis-redis-dev
    restart: unless-stopped
    command: ['redis-server', '--loglevel', 'warning']
    ports:
      - '6380:6379'
    volumes:
      - redis_dev_data:/data
    networks:
      - anis-dev
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  redisinsight:
    image: redis/redisinsight:latest
    container_name: anis-redisinsight-dev
    restart: unless-stopped
    ports:
      - '5540:5540'
    networks:
      - anis-dev
    depends_on:
      - redis

networks:
  anis-dev:
    driver: bridge

volumes:
  mongo_dev_data:
  redis_dev_data:
