# One worker per CPU core — Docker sets nproc to container CPU quota.
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  # Formula: worker_processes × worker_connections = total concurrent connections.
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 4;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  add_header X-Frame-Options           "SAMEORIGIN"           always;
  add_header X-Content-Type-Options    "nosniff"              always;
  add_header X-XSS-Protection          "1; mode=block"        always;
  add_header Referrer-Policy           "strict-origin"        always;
  add_header Permissions-Policy        "geolocation=()"       always;

  server_tokens off;

  # Zone sizes: 1MB ≈ 16,000 IP states
  limit_req_zone  $binary_remote_addr zone=global:10m   rate=30r/s;
  limit_req_zone  $binary_remote_addr zone=auth:10m     rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  upstream api_backend {
    least_conn;

    server api_1:5000 max_fails=3 fail_timeout=30s;
    server api_2:5000 max_fails=3 fail_timeout=30s;

    keepalive 32;
  }


  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;   

    client_max_body_size 10M;

    location = /api/v1/health {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      access_log         off;  
    }

    location /socket.io/ {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;

      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;

      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_buffering    off;

      proxy_read_timeout  86400s;
      proxy_send_timeout  86400s;

      limit_conn conn_limit 20;
    }

    location ~ ^/api/v1/auth/(login|register|otp|reset-password) {
      limit_req  zone=auth burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection       "";
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req  zone=global burst=50 nodelay;
      limit_req_status 429;
      limit_conn conn_limit 10;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;

      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;

      proxy_next_upstream error timeout http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    location / {
      return 404;
    }

    error_page 429 /errors/429.json;
    error_page 502 503 504 /errors/5xx.json;

    location /errors/ {
      internal;
      return 200 '{"success":false,"status":"error","message":"Service unavailable"}';
      add_header Content-Type application/json;
    }
  }
}