x-backend-base: &backend-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runner
  restart: unless-stopped
  env_file: ./config.env
  environment: &backend-env
    NODE_ENV: production
    HOST_ON: DOCKER_CONTAINER
    DATABASE: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    REDIS_HOST: redis
    REDIS_PORT: '6379'
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    EMBEDDING_SERVICE_URL: 'http://embedding-service:8001'
  networks:
    - anis-prod
  logging: &default-logging
    driver: json-file
    options:
      max-size: '20m'
      max-file: '5'
  depends_on:
    mongo:
      condition: service_healthy
    redis:
      condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: anis-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      # - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - anis-prod
    depends_on:
      api_1:
        condition: service_healthy
      api_2:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  api_1:
    <<: *backend-base
    container_name: anis-api-1
    command: ['node', 'dist/server.js']
    environment:
      <<: *backend-env
      INSTANCE_ID: 'api-1'
    expose:
      - '5000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api_2:
    <<: *backend-base
    container_name: anis-api-2
    command: ['node', 'dist/server.js']
    environment:
      <<: *backend-env
      INSTANCE_ID: 'api-2'
    expose:
      - '5000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Background worker (queue processor) ─────────────────────────────────
  worker:
    <<: *backend-base
    container_name: anis-worker
    command: ['node', 'dist/worker.js']
    environment:
      <<: *backend-env
      INSTANCE_ID: 'worker-1'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'worker.js']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Embedding service ───────────────────────────────────────────────
  embedding-service:
    build:
      context: ../embedding-service
      dockerfile: Dockerfile
    container_name: anis-embedding
    restart: unless-stopped
    expose:
      - '8001'
    volumes:
      - ../embedding-service/clip_local:/app/clip_local:ro
      - ../embedding-service/models:/app/models:ro
    environment:
      SERVICE_NAME: 'embedding-service'
      AUTH_ENABLED: 'true'
      JWT_ALGORITHM: 'HS256'
      JWT_SECRET: ${EMBEDDING_JWT_SECRET}
      ORT_THREADS: '2'
      TRANSFORMERS_OFFLINE: '1'
      HF_DATASETS_OFFLINE: '1'
      HF_HOME: '/home/appuser/.cache/huggingface'
      TRANSFORMERS_NO_ADVISORY_WARNINGS: '1'
    networks:
      - anis-prod
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: anis-mongo
    restart: unless-stopped
    command:
      - mongod
      - --quiet
      - --auth
      - --logpath
      - /dev/null
    expose:
      - '27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_prod_data:/data/db
      - mongo_prod_config:/data/configdb
    networks:
      - anis-prod
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '-u',
          '${MONGO_USER}',
          '-p',
          '${MONGO_PASSWORD}',
          '--authenticationDatabase',
          'admin',
          '--eval',
          "db.adminCommand('ping')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: anis-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --loglevel
      - warning
      - --save
      - '300'
      - '1'
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
    expose:
      - '6379'
    volumes:
      - redis_prod_data:/data
    networks:
      - anis-prod
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'

# ─────────────────────────────────────────────────────────────────────────────

networks:
  anis-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo_prod_data:
    driver: local
  mongo_prod_config:
    driver: local
  redis_prod_data:
    driver: local
  nginx_logs:
    driver: local
